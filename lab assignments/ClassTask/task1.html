<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Problem 1: Form Validation</title>
</head>
<body>
    <div class="container">
        <h1>Form Validation</h1>
        <form id="validationForm">
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" required />
            </div>
            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" required />
            </div>
            <button type="submit">Submit</button>
            <div id="message" class="message"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('validationForm');
        const messageDiv = document.getElementById('message');

        form.onsubmit = (e) => {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();

            messageDiv.classList.remove('error', 'success', 'show');

            if (firstName === '' || lastName === '') {
                messageDiv.textContent = 'Both fields must not be empty.';
                messageDiv.classList.add('error', 'show');
                alert('Both fields must not be empty.');
                return;
            }

            if (firstName.length < 2 || lastName.length < 2) {
                messageDiv.textContent = 'Each field must have at least 2 characters.';
                messageDiv.classList.add('error', 'show');
                alert('Each field must have at least 2 characters.');
                return;
            }

            messageDiv.textContent = `Form submitted successfully! Welcome, ${firstName} ${lastName}`;
            messageDiv.classList.add('success', 'show');
            form.reset();
        };
    </script>
</body>
</html>

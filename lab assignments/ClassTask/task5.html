<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Problem 5: Random Background Color</title>
</head>
<body>
    <div class="container">
        <h1>🎨 Random Background</h1>
        <p class="subtitle">Click the button to change the background to a random color</p>
        
        <button id="changeBtn">Change Background</button>

        <div id="colorDisplay" class="color-display">
            <p>Current Color:</p>
            <div class="color-hex" id="colorHex">#87CEEB</div>
            <div class="color-preview" id="colorPreview"></div>
        </div>

        <div class="info">
            💡 Each click generates a new random RGB color and applies it to the background!
        </div>
    </div>

    <script>
        const changeBtn = document.getElementById('changeBtn');
        const colorDisplay = document.getElementById('colorDisplay');
        const colorHex = document.getElementById('colorHex');
        const colorPreview = document.getElementById('colorPreview');

        function generateRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        changeBtn.addEventListener('click', () => {
            const randomColor = generateRandomColor();
            document.body.style.backgroundColor = randomColor;
            colorHex.textContent = randomColor;
            colorPreview.style.backgroundColor = randomColor;
            colorDisplay.classList.add('show');
        });

        const initialColor = '#87CEEB';
        colorHex.textContent = initialColor;
        colorPreview.style.backgroundColor = initialColor;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 4: Grid Layout</title>
    <style>
        body {
            background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
            background-size: 10px 10px;
        }
        #container {
            width: 300px;
            height: 200px;
            border: 2px solid black;
            position: relative; [cite: 35]
            margin: 20px;
            background-color: white;
        }
        #bottomRight {
            width: 80px;
            height: 40px;
            border: 1px solid black;
            position: absolute;
            bottom: 10px; 
            right: 10px; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h2>Absolute Position Example</h2>
    <div id="container">
        Container Area (300px x 200px)
        <div id="bottomRight">Bottom Right</div>
    </div>
    <p>
        <strong>Container:</strong> 300x200px (30x20 grid squares) [cite: 34]<br>
        <strong>Small Box:</strong> 80x40px (8x4 grid squares) [cite: 34]
    </p>
</body>
</html>
